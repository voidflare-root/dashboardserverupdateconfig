<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN Server Panel</title>

<style>

body{
background:#0b0614;
font-family:Arial;
color:white;
padding:20px;
}

.box{
max-width:400px;
margin:auto;
background:#14091f;
padding:20px;
border-radius:20px;
border:1px solid #ff2bd6;
}

h1{
text-align:center;
}

textarea{
width:100%;
height:250px;
background:#1a1026;
color:#00ffcc;
border:none;
padding:15px;
border-radius:15px;
margin-top:15px;
font-size:14px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#ff2bd6,#7b2cff);
color:white;
font-weight:bold;
font-size:16px;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:12px;
background:#1a1026;
color:#00ffcc;
}

</style>
</head>

<body>

<div class="box">

<h1>VPN SERVER PANEL</h1>

<p>RAW LINK</p>

<input type="text" id="rawlink" readonly>

<p style="margin-top:20px;">JSON DATA</p>

<textarea id="jsonbox">
{
  "config_version":"1.0",
  "servers":[
    {
      "name":"INDIA-1",
      "host":"example.com",
      "port":"443"
    }
  ]
}
</textarea>

<button onclick="openJson()">
OPEN JSON FILE
</button>

</div>

<script>

document.getElementById("rawlink").value =
window.location.origin + "/servers.json";

function openJson(){

let data =
document.getElementById("jsonbox").value;

let blob =
new Blob([data], {type:"application/json"});

let url =
URL.createObjectURL(blob);

window.open(url);

}

</script>

</body>
</html>
