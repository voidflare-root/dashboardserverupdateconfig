<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIYUSH VPN GEN</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:linear-gradient(160deg,#050014,#18002e,#050014);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  padding:20px;
}

.phone{
  width:360px;
  min-height:720px;
  background:#0b0614;
  border-radius:35px;
  padding:20px;
  border:2px solid #ff2bd6;
  box-shadow:0 0 35px #ff2bd6;
}

.header{
  text-align:center;
  margin-top:15px;
}

.logo{
  width:95px;
  height:95px;
  margin:auto;
  border-radius:50%;
  background:linear-gradient(135deg,#ff2bd6,#7b2cff);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:42px;
  box-shadow:0 0 25px #ff2bd6;
}

h1{
  margin-top:16px;
  font-size:24px;
  letter-spacing:1px;
}

.sub{
  margin-top:5px;
  color:#b8a8c9;
  font-size:14px;
}

.card{
  margin-top:25px;
  background:#14091f;
  border:1px solid #ff2bd6;
  border-radius:24px;
  padding:18px;
  box-shadow:0 0 18px #441155;
}

.row{
  display:flex;
  justify-content:space-between;
  margin:14px 0;
  font-size:15px;
}

.value{
  color:#00ffcc;
}

.raw-box{
  margin-top:18px;
  background:#0b0614;
  border:1px solid #ff2bd6;
  border-radius:18px;
  padding:14px;
}

.raw-title{
  color:#ff4fe0;
  margin-bottom:10px;
  font-size:14px;
}

.raw-input{
  width:100%;
  padding:13px;
  border:none;
  outline:none;
  border-radius:14px;
  background:#1a1026;
  color:#00ffcc;
  font-size:12px;
}

.btn{
  display:block;
  margin-top:20px;
  text-decoration:none;
  text-align:center;
  background:linear-gradient(90deg,#ff2bd6,#7b2cff);
  color:white;
  padding:15px;
  border-radius:18px;
  font-weight:bold;
  box-shadow:0 0 18px #ff2bd6;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.03);
}

.server{
  margin-top:20px;
  background:#0f0718;
  border-radius:20px;
  padding:16px;
  border:1px solid #2d1b3d;
}

.server h3{
  color:#ff4fe0;
  margin-bottom:10px;
}

.server p{
  margin:5px 0;
  color:#ddd;
}

.footer{
  text-align:center;
  color:#777;
  margin-top:25px;
  font-size:12px;
}

</style>
</head>

<body>

<div class="phone">

  <div class="header">

    <div class="logo">
      🛡️
    </div>

    <h1>PIYUSH VPN GEN</h1>

    <p class="sub">
      Server Update Panel
    </p>

  </div>

  <div class="card">

    <div class="row">
      <span>Config Version</span>
      <span class="value">1.0</span>
    </div>

    <div class="row">
      <span>Total Servers</span>
      <span class="value">1</span>
    </div>

    <div class="row">
      <span>Status</span>
      <span class="value">Online</span>
    </div>

    <!-- RAW LINK BOX -->

    <div class="raw-box">

      <p class="raw-title">
        RAW LINK
      </p>

      <input
        type="text"
        class="raw-input"
        value="https://your-site.onrender.com/servers.json"
        readonly
      >

    </div>

    <a class="btn" href="servers.json">
      OPEN JSON FILE
    </a>

  </div>

  <!-- SERVER CARD -->

  <div class="server">

    <h3>🇮🇳 INDIA SERVER</h3>

    <p>Host: example.com</p>

    <p>Port: 443</p>

    <p>Protocol: SSH / Payload</p>

    <p>Status: Online</p>

  </div>

  <div class="footer">
    © 2026 PIYUSH VPN GEN
  </div>

</div>

</body>
</html>
