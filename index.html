<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN UPDATE PANEL</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(160deg,#050014,#18002e,#050014);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

.phone{
width:360px;
min-height:720px;
background:#0b0614;
border-radius:35px;
padding:20px;
border:2px solid #ff2bd6;
box-shadow:0 0 35px #ff2bd6;
}

.logo{
width:90px;
height:90px;
border-radius:50%;
background:linear-gradient(135deg,#ff2bd6,#7b2cff);
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
margin:auto;
box-shadow:0 0 25px #ff2bd6;
}

h1{
text-align:center;
margin-top:15px;
font-size:24px;
}

.sub{
text-align:center;
color:#b8a8c9;
margin-top:5px;
font-size:13px;
}

.card{
margin-top:25px;
background:#14091f;
border:1px solid #ff2bd6;
border-radius:22px;
padding:18px;
}

.title{
color:#ff4fe0;
margin-bottom:10px;
font-size:14px;
}

input,textarea{
width:100%;
background:#1a1026;
border:none;
outline:none;
padding:14px;
border-radius:16px;
color:#00ffcc;
font-size:12px;
margin-top:8px;
}

textarea{
height:320px;
resize:none;
white-space:pre-wrap;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:18px;
margin-top:14px;
font-weight:bold;
background:linear-gradient(90deg,#ff2bd6,#7b2cff);
color:white;
box-shadow:0 0 18px #ff2bd6;
}

.msg{
text-align:center;
margin-top:15px;
font-size:14px;
color:#00ff99;
word-break:break-all;
}

.small{
margin-top:20px;
background:#1a1026;
padding:12px;
border-radius:14px;
font-size:11px;
max-height:120px;
overflow:auto;
white-space:pre-wrap;
word-break:break-all;
}
</style>
</head>

<body>

<div class="phone">

<div class="logo">🛡️</div>

<h1>PIYUSH VPN GEN</h1>

<p class="sub">
ONLINE SERVER UPDATE PANEL
</p>

<div class="card">

<div class="title">
RAW LINK
</div>

<input type="text"
id="rawLink"
readonly>

<button class="btn"
onclick="copyRaw()">
COPY RAW LINK
</button>

<div class="title"
style="margin-top:20px;">
PASSWORD
</div>

<input type="password"
id="password"
placeholder="Enter password">

<div class="title"
style="margin-top:20px;">
GITHUB TOKEN
</div>

<input type="password"
id="token"
placeholder="Paste GitHub token">

<div class="title"
style="margin-top:20px;">
CONFIG / JSON
</div>

<textarea id="config"></textarea>

<button class="btn"
onclick="updateServer()">
UPDATE SERVER
</button>

<div class="msg"
id="msg">
</div>

<div class="small"
id="preview">
Loading...
</div>

</div>

</div>

<script>

const PASSWORD = "ghostxtg";

const OWNER = "voidflare-root";

const REPO = "dashboardserverupdateconfig";

const FILE_PATH = "servers.json";

const BRANCH = "main";

const RAW =
"https://" +
OWNER +
".github.io/" +
REPO +
"/" +
FILE_PATH;

const API =
"https://api.github.com/repos/" +
OWNER +
"/" +
REPO +
"/contents/" +
FILE_PATH;

document.getElementById("rawLink").value =
RAW;

let savedToken =
localStorage.getItem("github_token");

if(savedToken){
document.getElementById("token").value =
savedToken;
}

async function loadConfig(){

try{

let res =
await fetch(
RAW + "?t=" + Date.now()
);

let text =
await res.text();

document.getElementById("config").value =
text;

document.getElementById("preview").innerText =
text;

}catch(e){

document.getElementById("preview").innerText =
"Config load failed";

}

}

function copyRaw(){

navigator.clipboard.writeText(RAW);

document.getElementById("msg").innerText =
"✅ RAW LINK COPIED";

}

async function updateServer(){

let pass =
document.getElementById("password").value;

if(pass !== PASSWORD){

document.getElementById("msg").style.color =
"red";

document.getElementById("msg").innerText =
"❌ WRONG PASSWORD";

return;

}

let token =
document.getElementById("token").value.trim();

if(!token){

document.getElementById("msg").style.color =
"red";

document.getElementById("msg").innerText =
"❌ TOKEN REQUIRED";

return;

}

localStorage.setItem(
"github_token",
token
);

let content =
document.getElementById("config").value;

try{

document.getElementById("msg").style.color =
"#00ff99";

document.getElementById("msg").innerText =
"Updating...";

let getFile =
await fetch(
API + "?ref=" + BRANCH,
{
headers:{
Authorization:
"Bearer " + token,
Accept:
"application/vnd.github+json"
}
}
);

let fileData =
await getFile.json();

let update =
await fetch(
API,
{
method:"PUT",
headers:{
Authorization:
"Bearer " + token,
Accept:
"application/vnd.github+json",
"Content-Type":
"application/json"
},
body:JSON.stringify({

message:
"VPN CONFIG UPDATE",

content:
btoa(
unescape(
encodeURIComponent(
content
)
)
),

sha:fileData.sha,

branch:BRANCH

})
}
);

if(update.ok){

document.getElementById("msg").style.color =
"#00ff99";

document.getElementById("msg").innerText =
"✅ SERVER UPDATED SUCCESSFULLY";

document.getElementById("preview").innerText =
content;

}else{

document.getElementById("msg").style.color =
"red";

document.getElementById("msg").innerText =
"❌ UPDATE FAILED";

}

}catch(e){

document.getElementById("msg").style.color =
"red";

document.getElementById("msg").innerText =
"❌ ERROR";

}

}

loadConfig();

</script>

</body>
</html>
