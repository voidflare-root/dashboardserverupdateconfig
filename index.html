<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN Server Update</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:linear-gradient(160deg,#050014,#18002e,#050014);min-height:100vh;display:flex;justify-content:center;align-items:center;color:white;padding:20px}
.phone{width:360px;min-height:720px;background:#0b0614;border-radius:35px;padding:20px;border:2px solid #ff2bd6;box-shadow:0 0 35px #ff2bd6}
.page{display:none}.active{display:block}
.header{text-align:center;margin-top:15px}
.logo{width:95px;height:95px;margin:auto;border-radius:50%;background:linear-gradient(135deg,#ff2bd6,#7b2cff);display:flex;justify-content:center;align-items:center;font-size:42px;box-shadow:0 0 25px #ff2bd6}
h1{margin-top:16px;font-size:24px}.sub{margin-top:5px;color:#b8a8c9;font-size:14px}
.card{margin-top:25px;background:#14091f;border:1px solid #ff2bd6;border-radius:24px;padding:18px;box-shadow:0 0 18px #441155}
.raw-title{color:#ff4fe0;margin-bottom:10px;font-size:14px}
input,textarea{width:100%;padding:13px;border:none;outline:none;border-radius:14px;background:#1a1026;color:#00ffcc;font-size:12px;margin-top:8px}
textarea{height:300px;resize:none;white-space:pre-wrap}
.btn{display:block;margin-top:14px;text-align:center;background:linear-gradient(90deg,#ff2bd6,#7b2cff);color:white;padding:14px;border-radius:18px;font-weight:bold;box-shadow:0 0 18px #ff2bd6;border:none;width:100%}
.server{margin-top:20px;background:#0f0718;border-radius:20px;padding:16px;border:1px solid #2d1b3d}
.server h3{color:#ff4fe0;margin-bottom:10px}
.config-small{height:120px;overflow:auto;background:#1a1026;border-radius:14px;padding:12px;color:#ddd;font-size:12px;word-break:break-all;white-space:pre-wrap}
.msg{text-align:center;margin-top:15px;color:#00ff99;font-size:14px}
.footer{text-align:center;color:#777;margin-top:25px;font-size:12px}
</style>
</head>

<body>
<div class="phone">

<div id="homePage" class="page active">
  <div class="header">
    <div class="logo">🛡️</div>
    <h1>PIYUSH VPN GEN</h1>
    <p class="sub">GitHub Server Update Panel</p>
  </div>

  <div class="card">
    <p class="raw-title">RAW LINK</p>
    <input id="rawLink" readonly>
    <button class="btn" onclick="copyRaw()">COPY RAW LINK</button>
    <button class="btn" onclick="openPassword()">OPEN JSON FILE</button>
    <p class="msg" id="homeMsg"></p>
  </div>

  <div class="server">
    <h3>🇮🇳 SERVER CONFIG</h3>
    <div class="config-small" id="serverConfig">Loading...</div>
  </div>

  <div class="footer">© 2026 PIYUSH VPN GEN</div>
</div>

<div id="passwordPage" class="page">
  <div class="header">
    <div class="logo">🔐</div>
    <h1>PASSWORD</h1>
    <p class="sub">Password: ghostxtg</p>
  </div>

  <div class="card">
    <input type="password" id="passwordBox" placeholder="Enter password">
    <button class="btn" onclick="checkPassword()">CONFIRM</button>
    <button class="btn" onclick="showPage('homePage')">BACK</button>
    <p class="msg" id="passMsg"></p>
  </div>
</div>

<div id="editorPage" class="page">
  <div class="header">
    <div class="logo">📄</div>
    <h1>UPDATE JSON</h1>
    <p class="sub">Paste config and update GitHub file</p>
  </div>

  <div class="card">
    <p class="raw-title">GitHub Token</p>
    <input type="password" id="tokenBox" placeholder="Paste GitHub token">

    <p class="raw-title" style="margin-top:15px;">Config / JSON</p>
    <textarea id="configBox"></textarea>

    <button class="btn" onclick="copyConfig()">COPY JSON</button>
    <button class="btn" onclick="updateGitHub()">UPDATE GITHUB JSON</button>
    <button class="btn" onclick="showPage('homePage')">BACK</button>

    <p class="msg" id="msg"></p>
  </div>
</div>

</div>

<script>
const OWNER = "voidflare-root";
const REPO = "render-server-update-";
const BRANCH = "main";
const FILE_PATH = "servers.json";
const PASSWORD = "ghostxtg";

const RAW_LINK = `https://${OWNER}.github.io/${REPO}/${FILE_PATH}`;
const API_URL = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;

document.getElementById("rawLink").value = RAW_LINK;

function showPage(id){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function openPassword(){
  showPage("passwordPage");
}

function checkPassword(){
  const pass = document.getElementById("passwordBox").value;
  if(pass === PASSWORD){
    showPage("editorPage");
  }else{
    document.getElementById("passMsg").style.color = "red";
    document.getElementById("passMsg").innerText = "❌ WRONG PASSWORD";
  }
}

function toBase64Unicode(str){
  return btoa(unescape(encodeURIComponent(str)));
}

function fromBase64Unicode(str){
  return decodeURIComponent(escape(atob(str)));
}

async function loadConfig(){
  try{
    const res = await fetch(RAW_LINK + "?t=" + Date.now());
    const text = await res.text();

    document.getElementById("serverConfig").innerText = text;
    document.getElementById("configBox").value = text;
  }catch(e){
    document.getElementById("serverConfig").innerText = "Config load failed";
  }
}

async function updateGitHub(){
  const token = document.getElementById("tokenBox").value.trim();
  const content = document.getElementById("configBox").value;

  if(!token){
    document.getElementById("msg").style.color = "red";
    document.getElementById("msg").innerText = "❌ GitHub token paste karo";
    return;
  }

  try{
    document.getElementById("msg").style.color = "#00ff99";
    document.getElementById("msg").innerText = "Updating...";

    const getRes = await fetch(API_URL + "?ref=" + BRANCH, {
      headers:{
        "Authorization":"Bearer " + token,
        "Accept":"application/vnd.github+json"
      }
    });

    if(!getRes.ok){
      throw new Error("File SHA get failed");
    }

    const fileData = await getRes.json();

    const putRes = await fetch(API_URL, {
      method:"PUT",
      headers:{
        "Authorization":"Bearer " + token,
        "Accept":"application/vnd.github+json",
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message:"Update VPN server config",
        content:toBase64Unicode(content),
        sha:fileData.sha,
        branch:BRANCH
      })
    });

    if(!putRes.ok){
      const err = await putRes.text();
      throw new Error(err);
    }

    document.getElementById("serverConfig").innerText = content;
    document.getElementById("msg").style.color = "#00ff99";
    document.getElementById("msg").innerText = "✅ GITHUB JSON UPDATED SUCCESSFULLY";

  }catch(e){
    document.getElementById("msg").style.color = "red";
    document.getElementById("msg").innerText = "❌ UPDATE FAILED: token/permission/path check karo";
  }
}

function copyRaw(){
  navigator.clipboard.writeText(RAW_LINK);
  document.getElementById("homeMsg").innerText = "✅ RAW LINK COPIED";
}

function copyConfig(){
  navigator.clipboard.writeText(document.getElementById("configBox").value);
  document.getElementById("msg").innerText = "✅ CONFIG COPIED";
}

loadConfig();
</script>
</body>
</html>
